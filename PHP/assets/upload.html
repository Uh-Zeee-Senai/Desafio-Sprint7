<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Upload de Imagem</title>

<style>
    body {
        background: #0f172a;
        color: white;
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: #1e293b;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        width: 350px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        margin: 10px 0;
    }

    button {
        background: #2563eb;
        border: none;
        padding: 10px 20px;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #1d4ed8;
    }

    #preview {
        margin-top: 15px;
        max-width: 100%;
        border-radius: 10px;
    }

    #msg {
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="card">
    <h2>Upload de Imagem</h2>

    <form id="formUpload">
        <input type="file" name="imagem" id="imagem" accept="image/*" required><br>

        <img id="preview" style="display:none;">

        <button type="submit">Enviar</button>
    </form>

    <div id="msg"></div>
</div>

<script>
const form = document.getElementById("formUpload");
const preview = document.getElementById("preview");
const input = document.getElementById("imagem");
const msg = document.getElementById("msg");

input.onchange = () => {
    const file = input.files[0];
    if(file){
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
};

form.onsubmit = async (e) => {
    e.preventDefault();

    const formData = new FormData(form);

    msg.innerHTML = "Enviando...";
    msg.style.color = "yellow";

    try {
        const response = await fetch("../api/feedback_imagem.php", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if(data.status === "success"){
            msg.innerHTML = "Imagem enviada com sucesso!";
            msg.style.color = "lightgreen";

            setTimeout(() => {
                window.close();
            }, 1500);

        } else {
            msg.innerHTML = data.message;
            msg.style.color = "red";
        }

    } catch(err){
        msg.innerHTML = "Erro no upload";
        msg.style.color = "red";
    }
};
</script>

</body>
</html>
