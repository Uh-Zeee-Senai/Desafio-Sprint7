<!DOCTYPE html>
<html>
<head>
    <title>Scanner QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        #reader {
            margin: auto;
            border-radius: 15px;
            overflow: hidden;
        }

        .sucesso {
            color: #22c55e;
            font-size: 20px;
        }

        .erro {
            color: #ef4444;
            font-size: 20px;
        }
    </style>
</head>

<body>

<h2>Escaneie o QR Code</h2>
<div id="reader" style="width:300px;"></div>

<p id="status"></p>

<script>
function onScanSuccess(decodedText) {
    fetch("http://localhost/Desafio_Sprint/php/api/validar_ingresso.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ qr_code: decodedText })
    })
    .then(res => res.json())
    .then(data => {
        let status = document.getElementById("status");

        status.innerText = data.message;
        status.className = data.status === "success" ? "sucesso" : "erro";
    });
}

new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 })
    .render(onScanSuccess);
</script>

</body>
</html>
